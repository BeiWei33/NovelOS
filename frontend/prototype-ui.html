<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovelOS — UI Prototype (三栏经典)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.5}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ===== Light (default) ===== */
body{background:#f8f7f4;color:#1a1a1a}
.topbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #e2dfd7;background:#fff;flex-shrink:0}
.topbar .logo{font-weight:700;font-size:16px;color:#8b5cf6}
.topbar .logo span{color:#1a1a1a}
.topbar-nav{display:flex;gap:4px;margin-left:20px}
.topbar-nav a{color:#6b6b6b;text-decoration:none;padding:4px 10px;border-radius:4px;font-size:13px;transition:.15s}
.topbar-nav a:hover{background:#e8e5df;color:#1a1a1a}
.avatar{width:28px;height:28px;border-radius:50%;background:#ede9fe;color:#8b5cf6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}

/* ===== Layout A: Three-panel ===== */
#container{flex:1;display:grid;grid-template-columns:280px 1fr 320px;overflow:hidden}
.sidebar{background:#f2f0ec;border-right:1px solid #e2dfd7;display:flex;flex-direction:column;overflow:hidden}
.sidebar .head{padding:16px;border-bottom:1px solid #e2dfd7;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:#6b6b6b;text-transform:uppercase;letter-spacing:.5px}
.sidebar .list{flex:1;overflow-y:auto;padding:8px}
.chap{padding:10px 12px;border-radius:8px;margin-bottom:2px;cursor:pointer;transition:.1s}
.chap:hover{background:#e8e5df}
.chap.act{background:#ede9fe;color:#8b5cf6}
.chap .t{font-size:14px;font-weight:500}
.chap .m{font-size:12px;color:#9a9a9a;margin-top:2px}
.scene{padding:6px 12px 6px 24px;border-radius:4px;cursor:pointer;font-size:13px;color:#6b6b6b;transition:.1s}
.scene:hover{background:#e8e5df;color:#1a1a1a}
.scene.act{color:#8b5cf6}
.scene .d{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:8px;vertical-align:middle}

.main{display:flex;flex-direction:column;overflow:hidden;background:#fff}
.toolbar{height:40px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #e2dfd7;gap:4px;flex-shrink:0}
.toolbar .s{width:1px;height:20px;background:#e2dfd7;margin:0 4px}
.btn-icon{width:28px;height:28px;border-radius:4px;border:none;background:transparent;color:#6b6b6b;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:.15s}
.btn-icon:hover{background:#e8e5df;color:#1a1a1a}

.editor{flex:1;overflow-y:auto;padding:32px 48px}
.editor .stitle{font-size:20px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #8b5cf6}
.editor p{margin-bottom:12px;line-height:1.8}
.dialogue{color:#8b5cf6;font-style:italic}
.mono{color:#6b6b6b;font-style:italic}

.panel{background:#fff;border-left:1px solid #e2dfd7;display:flex;flex-direction:column;overflow:hidden}
.panel .tabs{display:flex;border-bottom:1px solid #e2dfd7;flex-shrink:0}
.panel .tabs button{flex:1;padding:10px;border:none;background:transparent;color:#6b6b6b;font-size:13px;cursor:pointer;border-bottom:2px solid transparent;transition:.15s}
.panel .tabs button.act{color:#8b5cf6;border-bottom-color:#8b5cf6}
.pc{flex:1;overflow-y:auto;padding:16px}
.ps{margin-bottom:20px}
.ps h4{font-size:12px;font-weight:600;color:#9a9a9a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:12px;margin:2px;background:#f2f0ec;color:#6b6b6b}
.tag.hl{background:#ede9fe;color:#8b5cf6}

/* ===== Dark theme ===== */
body.dark{background:#0f0f0f;color:#e5e5e5}
body.dark .topbar{background:#1a1a1a;border-color:#2a2a2a}
body.dark .topbar .logo span{color:#e5e5e5}
body.dark .topbar-nav a{color:#888}
body.dark .topbar-nav a:hover{background:#252525;color:#e5e5e5}
body.dark .sidebar{background:#141414;border-color:#2a2a2a}
body.dark .sidebar .head{color:#888;border-color:#2a2a2a}
body.dark .chap:hover{background:#252525}
body.dark .chap.act{background:#1e1a2e;color:#a78bfa}
body.dark .chap .m{color:#666}
body.dark .scene{color:#888}
body.dark .scene:hover{background:#252525;color:#e5e5e5}
body.dark .scene.act{color:#a78bfa}
body.dark .main{background:#1a1a1a}
body.dark .toolbar{border-color:#2a2a2a}
body.dark .toolbar .s{background:#2a2a2a}
body.dark .btn-icon{color:#888}
body.dark .btn-icon:hover{background:#252525;color:#e5e5e5}
body.dark .editor .stitle{border-color:#a78bfa}
body.dark .dialogue{color:#a78bfa}
body.dark .mono{color:#888}
body.dark .panel{background:#1a1a1a;border-color:#2a2a2a}
body.dark .panel .tabs{border-color:#2a2a2a}
body.dark .panel .tabs button{color:#888}
body.dark .panel .tabs button.act{color:#a78bfa;border-color:#a78bfa}
body.dark .ps h4{color:#666}
body.dark .tag{background:#252525;color:#888}
body.dark .tag.hl{background:#1e1a2e;color:#a78bfa}

/* ===== Theme Toggle Button ===== */
.theme-btn{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:8px;padding:8px 16px;border-radius:100px;background:#fff;border:1px solid #e2dfd7;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:9999;font-size:13px;user-select:none;cursor:pointer;transition:.15s}
.theme-btn:hover{background:#f2f0ec}
body.dark .theme-btn{background:#1a1a1a;border-color:#2a2a2a;color:#e5e5e5}
body.dark .theme-btn:hover{background:#252525}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{border-radius:3px;background:#e2dfd7}
body.dark ::-webkit-scrollbar-thumb{background:#2a2a2a}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left" style="display:flex;align-items:center;gap:12px">
    <div class="logo">Novel<span>OS</span></div>
    <div class="topbar-nav">
      <a href="#">作品</a>
      <a href="#" style="color:#8b5cf6;font-weight:500">写作</a>
      <a href="#">大纲</a>
      <a href="#">设定</a>
    </div>
  </div>
  <div class="topbar-right" style="display:flex;align-items:center;gap:8px">
    <div class="avatar">李</div>
  </div>
</div>

<div id="container"></div>

<div class="theme-btn" id="themeBtn" onclick="toggleTheme()">&#9679; 切换到深色</div>

<script>
var dark = false;

var story = '<p>列车驶入隧道时，林川睁开了眼睛。</p><p>车窗倒映着一张疲惫的脸。三天没刮的胡茬在腮边连成一片阴影，眼白里的血丝像蛛网一样密布。他盯着自己的倒影看了几秒，又闭上眼睛。</p><p>对面的女人放下手机，看了他一眼。</p><p class="dialogue">"你也是去雾城？"</p><p>林川没有回答。他听见自己的心跳在隧道里格外清晰。</p><p class="dialogue">"最后一班车了。"女人又说，"这个时间去雾城的，不是疯子就是——"</p><p>她没有说完。</p><p>列车猛地刹车，金属摩擦声划破黑暗。灯光闪烁了两下，熄灭了。车厢陷入彻底的黑暗，只有应急灯在头顶亮起惨淡的绿光。</p><p class="mono">又是这样。</p><p>林川的手按在公文包上，指节发白。</p><p>三年前的那趟列车也是这样停下的。只是那次没有女人坐在对面，只有他一个人。准确说——还有一具尸体，在车厢尽头的洗手间里。</p><p>女人在黑暗中开口，声音很轻：</p><p class="dialogue">"你知道这趟车为什么叫\'雾城专线\'吗？"</p><p>林川没有回答。但他的手已经从公文包上移开了。</p><p class="dialogue">"因为开进去的人，"她说，"没有出来过。"</p>';

var panel = '<div class="ps"><h4>当前场景</h4><p style="font-size:13px;color:#6b6b6b;margin-bottom:8px">深夜的火车 · 场景三</p><p style="font-size:12px;color:#9a9a9a">目标：建立悬疑氛围，引入林川与神秘女人的初次交锋</p></div><div class="ps"><h4>登场人物</h4><div><span class="tag hl">林川 · 主角</span><span class="tag">神秘女人</span></div></div><div class="ps"><h4>写作风格</h4><div><span class="tag">悬疑</span><span class="tag">短句</span><span class="tag hl">低心理描写</span><span class="tag">快节奏</span></div></div><div class="ps"><h4>AI 建议</h4><div style="font-size:13px;color:#6b6b6b;line-height:1.6"><p style="margin-bottom:8px">&#128161; 可以考虑增加环境细节：隧道里的回声、车厢内的气味、车窗外的黑暗。</p><p>&#128161; 女人最后的台词暗示了世界观核心设定，建议在不远处的场景中展开呼应。</p></div></div>';

function render() {
  document.getElementById('container').innerHTML =
    '<div class="sidebar">' +
    '  <div class="head"><span>章节</span><button class="btn-icon" style="width:24px;height:24px;font-size:16px">+</button></div>' +
    '  <div class="list">' +
    '    <div class="chap act"><div class="t">第一章 迷雾之城</div><div class="m">3 场景 · 2,841 字</div><div class="scene act"><span class="d" style="background:#8b5cf6"></span>深夜的火车</div><div class="scene"><span class="d" style="background:#9a9a9a"></span>陌生人的来信</div><div class="scene"><span class="d" style="background:#9a9a9a"></span>废弃车站</div></div>' +
    '    <div class="chap"><div class="t">第二章 旧日回响</div><div class="m">2 场景 · 1,923 字</div><div class="scene"><span class="d" style="background:#9a9a9a"></span>档案室</div><div class="scene"><span class="d" style="background:#9a9a9a"></span>深夜通话</div></div>' +
    '    <div class="chap"><div class="t">第三章 暗流涌动</div><div class="m">4 场景 · 0 字 · 草稿</div></div>' +
    '  </div>' +
    '</div>' +
    '<div class="main">' +
    '  <div class="toolbar"><button class="btn-icon">&#8617;</button><button class="btn-icon">&#8627;</button><div class="s"></div><button class="btn-icon"><b>B</b></button><button class="btn-icon"><i>I</i></button><button class="btn-icon">"</button><div class="s"></div><button class="btn-icon" style="color:#8b5cf6">&#10024;</button><button class="btn-icon">&#9998;</button></div>' +
    '  <div class="editor"><div class="stitle">深夜的火车</div>' + story + '</div>' +
    '</div>' +
    '<div class="panel">' +
    '  <div class="tabs"><button class="act">人物</button><button>设定</button><button>风格</button><button>记忆</button></div>' +
    '  <div class="pc">' + panel + '</div>' +
    '</div>';
}

function toggleTheme() {
  dark = !dark;
  if (dark) {
    document.body.classList.add('dark');
    document.getElementById('themeBtn').innerHTML = '&#9670; 切换到亮色';
  } else {
    document.body.classList.remove('dark');
    document.getElementById('themeBtn').innerHTML = '&#9679; 切换到深色';
  }
}

render();
</script>
</body>
</html>
