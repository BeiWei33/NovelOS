<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NovelOS — UI Prototype</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;font-family:system-ui,'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;line-height:1.5}
body{display:flex;flex-direction:column;background:#f8f7f4;color:#1a1a1a}
.topbar{height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;border-bottom:1px solid #e2dfd7;background:#fff;flex-shrink:0}
.topbar .logo{font-weight:700;font-size:16px;color:#8b5cf6}
.topbar .logo span{color:#1a1a1a}
.topbar-nav{display:flex;gap:4px;margin-left:20px}
.topbar-nav a{color:#6b6b6b;text-decoration:none;padding:4px 10px;border-radius:4px;font-size:13px}
.topbar-nav a:hover{background:#e8e5df;color:#1a1a1a}
.topbar-right{display:flex;align-items:center;gap:8px}
.avatar{width:28px;height:28px;border-radius:50%;background:#ede9fe;color:#8b5cf6;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600}
#container{flex:1;display:flex;overflow:hidden}
/* A */
.layoutA{display:grid;grid-template-columns:280px 1fr 320px;flex:1;overflow:hidden}
.sideA{background:#f2f0ec;border-right:1px solid #e2dfd7;display:flex;flex-direction:column;overflow:hidden}
.sideA .head{padding:16px;border-bottom:1px solid #e2dfd7;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:600;color:#6b6b6b;text-transform:uppercase;letter-spacing:.5px}
.sideA .list{flex:1;overflow-y:auto;padding:8px}
.chap{padding:10px 12px;border-radius:8px;margin-bottom:2px;cursor:pointer}
.chap:hover{background:#e8e5df}
.chap.act{background:#ede9fe;color:#8b5cf6}
.chap .t{font-size:14px;font-weight:500}
.chap .m{font-size:12px;color:#9a9a9a;margin-top:2px}
.scene{padding:6px 12px 6px 24px;border-radius:4px;cursor:pointer;font-size:13px;color:#6b6b6b}
.scene:hover{background:#e8e5df;color:#1a1a1a}
.scene.act{color:#8b5cf6}
.scene .d{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:8px;vertical-align:middle}
.mainA{display:flex;flex-direction:column;overflow:hidden;background:#fff}
.toolbarA{height:40px;display:flex;align-items:center;padding:0 16px;border-bottom:1px solid #e2dfd7;gap:4px;flex-shrink:0}
.toolbarA .s{width:1px;height:20px;background:#e2dfd7;margin:0 4px}
.btn{width:28px;height:28px;border-radius:4px;border:none;background:transparent;color:#6b6b6b;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px}
.btn:hover{background:#e8e5df;color:#1a1a1a}
.editor{flex:1;overflow-y:auto;padding:32px 48px}
.editor .st{font-size:20px;font-weight:600;margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #8b5cf6}
.editor p{margin-bottom:12px;line-height:1.8}
.dialogue{color:#8b5cf6;font-style:italic}
.mono{color:#6b6b6b;font-style:italic}
.panelA{background:#fff;border-left:1px solid #e2dfd7;display:flex;flex-direction:column;overflow:hidden}
.tabs{display:flex;border-bottom:1px solid #e2dfd7;flex-shrink:0}
.tabs button{flex:1;padding:10px;border:none;background:transparent;color:#6b6b6b;font-size:13px;cursor:pointer;border-bottom:2px solid transparent}
.tabs button.act{color:#8b5cf6;border-bottom-color:#8b5cf6}
.pc{flex:1;overflow-y:auto;padding:16px}
.ps{margin-bottom:20px}
.ps h4{font-size:12px;font-weight:600;color:#9a9a9a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:12px;margin:2px;background:#f2f0ec;color:#6b6b6b}
.tag.hl{background:#ede9fe;color:#8b5cf6}
/* B */
.layoutB{position:relative;flex:1;overflow:hidden}
.sideB{position:absolute;left:0;top:0;bottom:0;width:56px;background:#f2f0ec;border-right:1px solid #e2dfd7;display:flex;flex-direction:column;align-items:center;padding:12px 0;z-index:10}
.sideB .ic{width:40px;height:40px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#6b6b6b;cursor:pointer;font-size:18px;margin-bottom:4px}
.sideB .ic:hover{background:#e8e5df;color:#1a1a1a}
.sideB .ic.act{background:#ede9fe;color:#8b5cf6}
.mainB{margin-left:56px;display:flex;flex-direction:column;height:100%;overflow:hidden}
.mainB .editor{max-width:720px;margin:0 auto;padding:40px 64px}
.drawer{position:fixed;right:-340px;top:48px;bottom:0;width:340px;background:#fff;border-left:1px solid #e2dfd7;transition:right .25s;z-index:20;display:flex;flex-direction:column}
.drawer.open{right:0}
.drawer .dh{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #e2dfd7}
.drawer .dh h3{font-size:14px;font-weight:600}
/* C */
.layoutC{display:flex;flex-direction:column;flex:1;overflow:hidden}
.bread{height:40px;display:flex;align-items:center;gap:8px;padding:0 16px;border-bottom:1px solid #e2dfd7;background:#fff;flex-shrink:0}
.bread .c{font-size:13px;color:#6b6b6b;white-space:nowrap}
.bread .c:last-child{color:#8b5cf6;font-weight:500}
.bread .c:not(:last-child)::after{content:'/';margin:0 6px;color:#9a9a9a}
.progress{height:3px;background:#e2dfd7;border-radius:2px;margin:8px 0;overflow:hidden;flex-shrink:0}
.progress .bar{height:100%;width:35%;background:#8b5cf6;border-radius:2px}
.rowC{flex:1;display:flex;overflow:hidden}
.rowC .editor{max-width:780px;margin:0 auto;padding:40px 80px}
.panelC{width:300px;border-left:1px solid #e2dfd7;background:#f2f0ec;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.panelC .tabs button.act{background:#fff;color:#8b5cf6;font-weight:500}
.panelC .tag{background:#fff}
/* Switcher */
.sw{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:12px;padding:8px 16px;border-radius:100px;background:#fff;border:1px solid #e2dfd7;box-shadow:0 4px 20px rgba(0,0,0,.12);z-index:9999;font-size:13px;user-select:none}
.sw button{width:32px;height:32px;border-radius:50%;border:none;background:#e8e5df;color:#1a1a1a;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px}
.sw button:hover{background:#ddd8d0}
.sw .lbl{font-weight:500;min-width:120px;text-align:center}
.sw .tb{background:transparent;border:none;color:#6b6b6b;cursor:pointer;font-size:16px;padding:4px;border-radius:50%;margin-left:4px}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left" style="display:flex;align-items:center;gap:12px">
    <div class="logo">Novel<span>OS</span></div>
    <div class="topbar-nav">
      <a href="#">作品</a>
      <a href="#" style="color:#8b5cf6;font-weight:500">写作</a>
      <a href="#">大纲</a>
      <a href="#">设定</a>
    </div>
  </div>
  <div class="topbar-right">
    <div class="avatar">李</div>
  </div>
</div>

<div id="container"></div>

<div class="sw">
  <button onclick="prev()">‹</button>
  <div class="lbl" id="lbl">A · 三栏经典</div>
  <button onclick="next()">›</button>
  <button class="tb" onclick="toggleDark()">◐</button>
</div>

var labels = {'A':'三栏经典','B':'极简浮动','C':'专注全宽'};
